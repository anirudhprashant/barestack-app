name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_POCKETBASE_URL: https://api.barestack.org

      # Fail the build on high/critical advisories in production deps.
      - name: Audit (prod, high+)
        run: npm audit --omit=dev --audit-level=high
